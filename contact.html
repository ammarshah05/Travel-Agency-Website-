<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="icon" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="contact.css">
</head>
<body>
   <div class="container-fluid px-3 px-md-5 container-fluid  ">
    <div class="main_container container-fluid d-flex align-items-center">

    
    <div class="navbar w-100 d-flex flex-column flex-md-row justify-content-between align-items-center px-3 px-lg-5 py-3">

        <div class="logo mb-2 mb-md-0">WT</div>

        <div class="menu_list d-flex flex-column flex-sm-row gap-2 gap-md-4 text-center text-md-end">
            <div><a href="/index.html">HOME</a></div>
            <div><a href="/about.html">ABOUT</a></div>
            <div><a href="/contact.html">CONTACT</a></div>
        </div>

    </div>
</div>

<div class="Contact_section container-fluid px-3 px-md-4 px-lg-5">

    <div class="inside_container row w-100 g-4 align-items-stretch">

        
        <div class="left_side col-12 col-lg-6">

            <div class="contact_info">

                <div class="info mb-4">
                    <div class="info_title">
                        <i class="fa-solid fa-location-dot info_icons"></i>
                        <div class="info_title">LOCATION</div>
                    </div>
                    <div class="info_content">
                        #2661 Janakpuri Colony, city name, town name
                    </div>
                </div>

                <div class="info mb-4">
                    <div class="info_title">
                        <i class="fa-regular fa-envelope info_icons"></i>
                        <div class="info_title">EMAIL</div>
                    </div>
                    <div class="info_content">
                        ammar.bukhari1511@gmail.com
                    </div>
                </div>

                <div class="info mb-4">
                    <div class="info_title">
                        <i class="fa-solid fa-square-phone info_icons"></i>
                        <div class="info_title">CALL</div>
                    </div>
                    <div class="info_content">
                        +920101010101
                    </div>
                </div>

            </div>

            <!-- IMAGE FIX -->
            <div class="mt-3">
                <img src="/img/company-img.jpg"
                     class="img-fluid w-100 rounded shadow-sm"
                     alt="image">
            </div>

        </div>


   
        <div class="right_side col-12 col-lg-6 d-flex flex-column">

            <div class="contact_form">Contact Us</div>

            <hr>

            <p>
                Let us know your questions, suggestions and concerns by filling out the contact form below.
            </p>

            <form class="d-flex flex-column gap-3">

                <div>
                    <label for="username">Username<sup>*</sup></label>
                    <input type="text" id="username" name="username" required class="form-control">
                </div>

                <div>
                    <label for="email">Email<sup>*</sup></label>
                    <input type="email" id="email" name="email" required class="form-control">
                </div>

                <div>
                    <label for="phone">Phone<sup>*</sup></label>
                    <input type="tel" id="phone" name="phone" required class="form-control">
                </div>

                <div>
                    <label for="msg">Message<sup>*</sup></label>
                    <textarea name="msg" id="msg" class="form-control" rows="6"></textarea>
                </div>

                <button class="submit_btn btn btn-danger px-5 py-2 align-self-center align-self-md-start">
                    SUBMIT
                </button>

            </form>

        </div>

    </div>
</div>



<div class="copyright_box text-center">

    <div class="social_medIcons d-flex gap-4 justify-content-center flex-wrap">
        <a href="https://www.facebook.com/" target="_blank">
            <i class="fa-brands fa-facebook SM_Icon"></i>
        </a>
        <a href="https://x.com/twitter" target="_blank">
            <i class="fa-brands fa-twitter SM_Icon"></i>
        </a>
        <a href="https://www.instagram.com/" target="_blank">
            <i class="fa-brands fa-instagram SM_Icon"></i>
        </a>
    </div>

    <div class="copyright px-2">
        World Travel © 2026, All Rights Reserved
    </div>

</div>
   </div>
    
</body>
</html>
